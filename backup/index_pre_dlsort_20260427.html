<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>世帯数ビューア</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface2:    #334155;
      --accent:      #3b82f6;
      --accent2:     #60a5fa;
      --text:        #f1f5f9;
      --text2:       #94a3b8;
      --text3:       #64748b;
      --green:       #22c55e;
      --orange:      #f97316;
      --red:         #ef4444;
      --radius:      12px;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    /* ===== App Shell ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ===== Header ===== */
    .header {
      background: var(--surface);
      padding: calc(12px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--surface2);
      flex-shrink: 0;
      z-index: 100;
    }
    .back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--accent2);
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 6px 2px 0;
      flex-shrink: 0;
    }
    .back-btn.visible { display: block; }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-sub {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ===== Search ===== */
    .search-wrap {
      padding: 8px 16px;
      background: var(--bg);
      flex-shrink: 0;
      position: relative;
      z-index: 90;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      padding: 0 12px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-icon { color: var(--text3); font-size: 16px; flex-shrink: 0; }
    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      padding: 10px 8px;
      font-family: inherit;
    }
    .search-input::placeholder { color: var(--text3); }
    .clear-btn {
      display: none;
      background: var(--surface2);
      border: none;
      color: var(--text2);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      line-height: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .clear-btn.visible { display: block; }

    /* Suggest dropdown */
    .suggest-list {
      display: none;
      position: absolute;
      top: 100%;
      left: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 0 0 var(--radius) var(--radius);
      max-height: 60vh;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .suggest-list.visible { display: block; }
    .suggest-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.1s;
    }
    .suggest-item:active { background: var(--surface2); }
    .suggest-item .s-name { font-size: 14px; font-weight: 500; }
    .suggest-item .s-path { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .suggest-hint {
      padding: 10px 14px;
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      line-height: 1.6;
    }

    /* ===== Content ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: var(--safe-bottom);
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    /* ===== Prefecture Grid ===== */
    .pref-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      padding: 12px;
    }
    .pref-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 8px;
      padding: 8px 2px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, background 0.12s;
      -webkit-user-select: none;
      user-select: none;
    }
    .pref-card:active { transform: scale(0.94); border-color: var(--accent); background: var(--surface2); }
    .pref-card.loaded { border-color: var(--accent2); }
    .pref-card .pref-name {
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      letter-spacing: -0.3px;
    }
    .pref-card .pref-areas {
      font-size: 9px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* ===== List Items ===== */
    .list-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.1s;
      gap: 12px;
    }
    .list-item:active { background: var(--surface); }
    .li-main { flex: 1; min-width: 0; }
    .li-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .li-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .li-count {
      font-size: 12px;
      color: var(--text2);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .li-arrow { color: var(--text3); font-size: 14px; flex-shrink: 0; }

    /* ===== Town List ===== */
    .town-list-header {
      display: flex;
      align-items: center;
      padding: 5px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--surface2);
      font-size: 11px;
      color: var(--text3);
      font-weight: 600;
      letter-spacing: 0.3px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .th-name { flex: 1.3; min-width: 0; }
    .th-stat { width: 68px; text-align: right; flex-shrink: 0; font-size: 11px; }
    .th-pct  { width: 52px; text-align: right; flex-shrink: 0; font-size: 11px; }

    .town-row {
      display: flex;
      align-items: center;
      min-height: 36px;
      padding: 6px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.1s;
      gap: 4px;
      text-decoration: none;
      color: inherit;
      -webkit-user-select: none;
      user-select: none;
    }
    .town-row:active { background: var(--surface); }
    .town-name {
      flex: 1.3;
      min-width: 0;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .town-val {
      width: 68px;
      text-align: right;
      font-size: 12px;
      color: var(--text2);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .town-pct {
      width: 52px;
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .pct-green        { color: var(--green); }
    .pct-yellow-green { color: #84cc16; }
    .pct-orange       { color: #f59e0b; }
    .pct-red          { color: var(--red); }
    .pct-none         { color: var(--text2); }
    .th-sort {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--surface2);
      transition: color 0.1s;
    }
    .th-sort:active { color: var(--accent); text-decoration-color: var(--accent); }

    @keyframes highlight {
      0%   { background-color: rgba(59, 130, 246, 0.35); }
      100% { background-color: transparent; }
    }
    .town-row.highlighted { animation: highlight 1.5s ease-out forwards; }

    /* ===== Loading ===== */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text3);
      gap: 12px;
      font-size: 13px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Empty / Error ===== */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.8;
    }
    .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.5; }
    .retry-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
    }
  /* ===== 配布リストモード ===== */
  #dlContainer { position:fixed; top:0;left:0;right:0;bottom:0; overflow-y:auto; -webkit-overflow-scrolling:touch; background:var(--bg); z-index:9999; padding-top:var(--safe-top); padding-bottom:var(--safe-bottom); }
  .dl-header { display:flex; align-items:center; gap:12px; padding:16px; background:var(--surface); border-bottom:1px solid var(--surface2); }
  .dl-icon { font-size:28px; }
  .dl-title { font-size:17px; font-weight:700; }
  .dl-sub { font-size:12px; color:var(--text3); margin-top:2px; }
  .dl-stats-row { display:flex; gap:8px; padding:12px 16px; }
  .dl-stat-card { flex:1; background:var(--surface); border-radius:10px; padding:10px 8px; text-align:center; }
  .dl-stat-num { font-size:18px; font-weight:700; color:var(--accent2); }
  .dl-stat-label { font-size:10px; color:var(--text3); margin-top:2px; }
  .dl-table-header { display:flex; align-items:center; padding:6px 16px; background:var(--surface); border-bottom:1px solid var(--surface2); font-size:11px; color:var(--text3); font-weight:600; position:sticky; top:0; z-index:10; }
  .dl-th-name { flex:1; min-width:0; }
  .dl-th-num { width:62px; text-align:right; flex-shrink:0; }
  .dl-th-sm  { width:42px; text-align:right; flex-shrink:0; }
  .dl-admin-hd { position:static; }
  .dl-row { display:flex; align-items:center; min-height:48px; padding:8px 16px; border-bottom:1px solid rgba(255,255,255,0.05); text-decoration:none; color:inherit; gap:4px; cursor:pointer; transition:background 0.1s; }
  .dl-row:active { background:var(--surface); }
  .dl-name { flex:1; min-width:0; }
  .dl-moji { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dl-city { font-size:11px; color:var(--text3); margin-top:1px; }
  .dl-val { width:62px; text-align:right; font-size:13px; color:var(--text2); font-variant-numeric:tabular-nums; flex-shrink:0; }
  .dl-sm  { width:42px; font-size:12px; }
  .dl-count { color:var(--accent2); font-weight:700; }
  .dl-hint { text-align:center; font-size:12px; color:var(--text3); padding:20px 16px; }
  .dl-tab-bar { display:flex; overflow-x:auto; background:var(--surface); border-bottom:2px solid var(--surface2); position:sticky; top:0; z-index:20; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .dl-tab-bar::-webkit-scrollbar { display:none; }
  .dl-tab { flex-shrink:0; padding:10px 14px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; display:flex; align-items:center; gap:5px; white-space:nowrap; transition:color 0.15s; }
  .dl-tab.active { color:var(--text); border-bottom-color:var(--accent); }
  .dl-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; }
  .dl-section { margin-bottom:4px; }
  .dl-section-hd { display:flex; align-items:center; gap:8px; padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--surface2); font-size:13px; }
  .dl-section-meta { margin-left:auto; font-size:12px; color:var(--text3); }
  .dl-auth { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:40px 32px; gap:16px; text-align:center; }
  .dl-auth-icon { font-size:48px; }
  .dl-auth-title { font-size:20px; font-weight:700; }
  .dl-auth-sub { font-size:14px; color:var(--text3); }
  .dl-pw-input { background:var(--surface); border:2px solid var(--surface2); border-radius:var(--radius); color:var(--text); font-size:28px; letter-spacing:10px; text-align:center; padding:14px 20px; width:180px; outline:none; font-family:inherit; }
  .dl-pw-input:focus { border-color:var(--accent); }
  .dl-pw-error { font-size:13px; color:var(--red); min-height:20px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <h1 id="headerTitle">世帯数ビューア</h1>
    <span class="header-sub" id="headerSub">全国版</span>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput"
             placeholder="町名を検索（府県選択後）..." autocomplete="off">
      <button class="clear-btn" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="suggest-list" id="suggestList"></div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>
  </div>
</div>

<script>
/* ============================================================
   世帯数ビューア 全国版 PWA
   data/index.json + data/XX.json の遅延読み込み構成
============================================================ */

// ---- State ----
var prefList      = [];   // [{code, name, areas}, ...]  ← index.json
var areasByPref   = {};   // {prefCode: [{c,ct,w,m,s,k,ky,la,lo}, ...]}
var loadedPrefs   = {};   // {prefCode: true}
var navStack        = [];   // [{view, params}, ...]
var forwardStack    = [];   // [{view, params}, ...]  ← 進む用
var currentView     = null;
var pendingScrollTo = null; // KEY_CODE (c) of area to scroll to
var suggestData     = [];   // [{a, prefCode, prefName}, ...]
var townSortKey     = 'm';  // 'm'|'s'|'k'|'ky'|'pct'
var townSortAsc     = true;
var currentTownParams = null;

// ---- Init ----
async function init() {
  try {
    var res = await fetch('data/index.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    prefList = data.prefectures || [];
    showPrefView();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div>'
      + 'データの読み込みに失敗しました<br><br>'
      + '<button class="retry-btn" onclick="location.reload()">再読み込み</button></div>';
  }
}

// ---- Data Loading ----
async function ensurePrefLoaded(prefCode) {
  if (loadedPrefs[prefCode]) return;
  var res = await fetch('data/' + prefCode + '.json');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  areasByPref[prefCode] = await res.json();
  loadedPrefs[prefCode] = true;
  // 都道府県カードに読み込み済みマーク
  var card = document.querySelector('.pref-card[data-code="' + prefCode + '"]');
  if (card) card.classList.add('loaded');
}

// ---- Navigation ----
function navigate(view, params) {
  if (currentView) navStack.push({view: currentView, params: currentView._params});
  forwardStack = [];
  showView(view, params);
  updateBackBtn();
}

function goBack() {
  if (navStack.length === 0) return;
  forwardStack.push({view: currentView, params: currentView._params});
  var prev = navStack.pop();
  showView(prev.view, prev.params);
  updateBackBtn();
}

function goForward() {
  if (forwardStack.length === 0) return;
  navStack.push({view: currentView, params: currentView._params});
  var next = forwardStack.pop();
  showView(next.view, next.params);
  updateBackBtn();
}

function updateBackBtn() {
  document.getElementById('backBtn').classList.toggle('visible', navStack.length > 0);
}

function showView(view, params) {
  currentView = view;
  currentView._params = params;
  view(params);
}

// ---- Views ----

// 都道府県一覧
function showPrefView() {
  document.getElementById('headerTitle').textContent = '世帯数ビューア';
  document.getElementById('headerSub').textContent = '全国版';
  navStack = [];
  currentView = showPrefView;
  currentView._params = null;
  updateBackBtn();

  var html = '<div class="pref-grid">';
  prefList.forEach(function(p) {
    var cls = loadedPrefs[p.code] ? ' loaded' : '';
    html += '<div class="pref-card' + cls + '" data-code="' + p.code + '" onclick="tapPref(\'' + p.code + '\')">'
      + '<div class="pref-name">' + esc(p.name) + '</div>'
      + '<div class="pref-areas">' + fmtNum(p.areas) + '</div>'
      + '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

// 都道府県タップ → データ読み込み → 市区町村
async function tapPref(prefCode) {
  if (loadedPrefs[prefCode]) {
    navigate(showCityView, prefCode);
    return;
  }
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>';
  try {
    await ensurePrefLoaded(prefCode);
    navigate(showCityView, prefCode);
  } catch (e) {
    var code = prefCode;
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div>'
      + '読み込みに失敗しました<br><br>'
      + '<button class="retry-btn" onclick="tapPref(\'' + code + '\')">再試行</button></div>';
  }
}

// 市区町村一覧
function showCityView(prefCode) {
  var pref = findPref(prefCode);
  document.getElementById('headerTitle').textContent = pref ? pref.name : prefCode;
  document.getElementById('headerSub').textContent = '';

  var areas = areasByPref[prefCode] || [];
  var cities = {};
  areas.forEach(function(a) {
    var key = a.ct || '不明';
    if (!cities[key]) cities[key] = {name: key, count: 0, hasWard: false};
    cities[key].count++;
    if (a.w) cities[key].hasWard = true;
  });

  var sorted = Object.values(cities).sort(function(a, b) {
    return a.name.localeCompare(b.name, 'ja');
  });

  var html = '';
  sorted.forEach(function(c) {
    var destView  = c.hasWard ? 'showWardView' : 'showTownView';
    var destParam = c.hasWard
      ? '{prefCode:\'' + prefCode + '\',city:\'' + jsStr(c.name) + '\'}'
      : '{prefCode:\'' + prefCode + '\',city:\'' + jsStr(c.name) + '\',ward:\'\'}';
    html += '<div class="list-item" onclick="navigate(' + destView + ',' + destParam + ')">'
      + '<div class="li-main"><div class="li-name">' + esc(c.name) + '</div></div>'
      + '<span class="li-count">' + fmtNum(c.count) + '</span>'
      + '<span class="li-arrow">›</span></div>';
  });
  if (!html) html = '<div class="empty-state"><div class="empty-icon">📭</div>データがありません</div>';
  document.getElementById('content').innerHTML = html;
}

// 区一覧（政令市）
function showWardView(params) {
  var pref = findPref(params.prefCode);
  document.getElementById('headerTitle').textContent = params.city;
  document.getElementById('headerSub').textContent = pref ? pref.name : '';

  var areas = areasByPref[params.prefCode] || [];
  var wards = {};
  areas.forEach(function(a) {
    if (a.ct !== params.city) return;
    var key = a.w || '（区なし）';
    if (!wards[key]) wards[key] = {name: key, count: 0};
    wards[key].count++;
  });

  var sorted = Object.values(wards).sort(function(a, b) {
    return a.name.localeCompare(b.name, 'ja');
  });

  var html = '';
  sorted.forEach(function(w) {
    var wardVal = (w.name === '（区なし）') ? '' : w.name;
    html += '<div class="list-item" onclick="navigate(showTownView,{prefCode:\'' + params.prefCode + '\',city:\'' + jsStr(params.city) + '\',ward:\'' + jsStr(wardVal) + '\'})">'
      + '<div class="li-main"><div class="li-name">' + esc(w.name) + '</div></div>'
      + '<span class="li-count">' + fmtNum(w.count) + '</span>'
      + '<span class="li-arrow">›</span></div>';
  });
  if (!html) html = '<div class="empty-state"><div class="empty-icon">📭</div>データがありません</div>';
  document.getElementById('content').innerHTML = html;
}

// 町丁目一覧（1行表示）
function showTownView(params) {
  var pref = findPref(params.prefCode);
  document.getElementById('headerTitle').textContent = params.ward || params.city;
  document.getElementById('headerSub').textContent = params.ward ? params.city : (pref ? pref.name : '');
  townSortKey = 'm';
  townSortAsc = true;
  currentTownParams = params;
  renderTownContent(params);
}

function sortTown(key) {
  if (townSortKey === key) {
    townSortAsc = !townSortAsc;
  } else {
    townSortKey = key;
    townSortAsc = (key === 'm');  // 名前は昇順、数値は降順をデフォルト
  }
  renderTownContent(currentTownParams);
}

function renderTownContent(params) {
  var pref     = findPref(params.prefCode);
  var prefName = pref ? pref.name : '';
  var areas    = areasByPref[params.prefCode] || [];
  var towns    = areas.filter(function(a) {
    return a.ct === params.city && (a.w || '') === (params.ward || '');
  });

  if (towns.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📭</div>データがありません</div>';
    return;
  }

  // ソート
  towns = towns.slice().sort(function(a, b) {
    var cmp;
    if (townSortKey === 'm') {
      cmp = a.m.localeCompare(b.m, 'ja');
    } else if (townSortKey === 'pct') {
      var pa = a.s > 0 ? a.ky / a.s : -1;
      var pb = b.s > 0 ? b.ky / b.s : -1;
      cmp = pa - pb;
    } else {
      cmp = (a[townSortKey] || 0) - (b[townSortKey] || 0);
    }
    return townSortAsc ? cmp : -cmp;
  });

  // ヘッダー（ソートインジケーター付き）
  var ind = {m: '', s: '', k: '', ky: '', pct: ''};
  ind[townSortKey] = townSortAsc ? ' ▲' : ' ▼';

  var html = '<div class="town-list-header">'
    + '<span class="th-name th-sort" onclick="sortTown(\'m\')">町丁目' + ind.m + '</span>'
    + '<span class="th-stat th-sort" onclick="sortTown(\'s\')">総世帯' + ind.s + '</span>'
    + '<span class="th-stat th-sort" onclick="sortTown(\'k\')">戸建' + ind.k + '</span>'
    + '<span class="th-stat th-sort" onclick="sortTown(\'ky\')">集合' + ind.ky + '</span>'
    + '<span class="th-pct th-sort" onclick="sortTown(\'pct\')">集合%' + ind.pct + '</span>'
    + '</div>';

  towns.forEach(function(t) {
    var pct    = t.s > 0 ? (t.ky / t.s * 100) : -1;
    var pctStr = pct < 0 ? '-' : pct.toFixed(0) + '%';
    var pctCls = pct < 0    ? 'pct-none'
               : pct >= 80  ? 'pct-green'
               : pct >= 60  ? 'pct-yellow-green'
               : pct >= 40  ? 'pct-orange'
               : 'pct-red';
    var q = encodeURIComponent(prefName + t.ct + (t.w || '') + t.m);
    html += '<a class="town-row" data-code="' + t.c + '"'
      + ' href="https://www.google.com/maps/search/' + q + '" target="_blank" rel="noopener noreferrer">'
      + '<div class="town-name">' + esc(t.m) + '</div>'
      + '<div class="town-val">' + fmtNum(t.s) + '</div>'
      + '<div class="town-val">' + fmtNum(t.k) + '</div>'
      + '<div class="town-val">' + fmtNum(t.ky) + '</div>'
      + '<div class="town-pct ' + pctCls + '">' + pctStr + '</div>'
      + '</a>';
  });

  document.getElementById('content').innerHTML = html;

  if (pendingScrollTo !== null) {
    var targetEl = document.querySelector('.town-row[data-code="' + pendingScrollTo + '"]');
    if (targetEl) {
      setTimeout(function() {
        targetEl.scrollIntoView({behavior: 'smooth', block: 'center'});
        targetEl.classList.add('highlighted');
        setTimeout(function() { targetEl.classList.remove('highlighted'); }, 1500);
      }, 100);
    }
    pendingScrollTo = null;
  }
}

// ---- Search ----
var searchInput    = document.getElementById('searchInput');
var suggestListEl  = document.getElementById('suggestList');
var searchClearBtn = document.getElementById('searchClear');
var searchDebounce = null;

searchInput.addEventListener('input', function() {
  clearTimeout(searchDebounce);
  var q = this.value.trim();
  searchClearBtn.classList.toggle('visible', q.length > 0);
  if (q.length < 1) { suggestListEl.classList.remove('visible'); return; }
  searchDebounce = setTimeout(function() { doSuggest(q); }, 120);
});

searchInput.addEventListener('focus', function() {
  var q = this.value.trim();
  if (q.length >= 1) doSuggest(q);
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) suggestListEl.classList.remove('visible');
});

function clearSearch() {
  searchInput.value = '';
  searchClearBtn.classList.remove('visible');
  suggestListEl.classList.remove('visible');
}

function doSuggest(query) {
  var q = query.toLowerCase();
  suggestData = [];

  var loadedCodes = Object.keys(loadedPrefs);
  var hasUnloaded = prefList.length > loadedCodes.length;

  for (var pi = 0; pi < loadedCodes.length && suggestData.length < 30; pi++) {
    var prefCode = loadedCodes[pi];
    var pref     = findPref(prefCode);
    var prefName = pref ? pref.name : '';
    var areas    = areasByPref[prefCode] || [];
    for (var i = 0; i < areas.length && suggestData.length < 30; i++) {
      var a = areas[i];
      if ((a.ct + a.w + a.m).toLowerCase().indexOf(q) !== -1) {
        suggestData.push({a: a, prefCode: prefCode, prefName: prefName});
      }
    }
  }

  var html = '';
  if (loadedCodes.length === 0) {
    html = '<div class="suggest-hint">都道府県を選択してから検索してください</div>';
  } else if (suggestData.length === 0) {
    html = '<div class="suggest-hint">該当なし（読み込み済み府県内）</div>';
  } else {
    suggestData.forEach(function(r, i) {
      html += '<div class="suggest-item" onclick="selectSuggest(' + i + ')">'
        + '<div class="s-name">' + esc(r.a.m) + '</div>'
        + '<div class="s-path">' + esc(r.prefName + ' ' + r.a.ct + (r.a.w ? ' ' + r.a.w : ''))
        + ' — 世帯 ' + fmtNum(r.a.s) + '</div>'
        + '</div>';
    });
  }
  if (hasUnloaded) {
    html += '<div class="suggest-hint">※ 他の都道府県は選択後に検索可能</div>';
  }
  suggestListEl.innerHTML = html;
  suggestListEl.classList.add('visible');
}

function selectSuggest(i) {
  var r = suggestData[i];
  if (!r) return;
  suggestListEl.classList.remove('visible');
  searchInput.value = '';
  searchClearBtn.classList.remove('visible');
  searchInput.blur();

  pendingScrollTo = r.a.c;  // KEY_CODE で該当行を特定
  navigate(showTownView, {prefCode: r.prefCode, city: r.a.ct, ward: r.a.w || ''});
}

// ---- Swipe Back ----
var touchStartX = 0;
var touchStartY = 0;

document.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 60 || Math.abs(dy) / Math.abs(dx) >= 0.6) return;
  if (dx > 0 && navStack.length > 0)     goBack();     // 右スワイプ＝戻る
  if (dx < 0 && forwardStack.length > 0) goForward();  // 左スワイプ＝進む
}, {passive: true});

// ---- Utilities ----
function findPref(code) {
  for (var i = 0; i < prefList.length; i++) {
    if (prefList[i].code === code) return prefList[i];
  }
  return null;
}

function fmtNum(n) {
  return Number(n || 0).toLocaleString('ja-JP');
}

// HTML エスケープ（表示用）
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// JS文字列リテラル内エスケープ（onclickのシングルクォート文字列用）
function jsStr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ============================================================
//  配布リストモード
// ============================================================
var STAFF_COLORS = ['#4285F4','#EA4335','#34A853','#FF6D01','#AB47BC','#00ACC1','#FFB300','#8D6E63','#546E7A','#E91E63'];
var _adminCtx = null;
var _adminTab = 0;

async function startDistribMode() {
  var params = new URLSearchParams(location.search);
  var mode = params.get('mode');
  if (!mode) { init(); return; }
  try { var r = await fetch('data/index.json'); prefList = (await r.json()).prefectures || []; } catch(e) {}
  var prefCodes = (params.get('pref') || '').split(',').map(function(s){return s.trim().padStart(2,'0');}).filter(Boolean);
  var dParam = params.get('d') || '';
  var areas = [];
  for (var i = 0; i < prefCodes.length; i++) {
    try { var res = await fetch('data/' + prefCodes[i] + '.json'); areas = areas.concat(await res.json()); } catch(e) {}
  }
  document.querySelector('.app').style.display = 'none';
  if (mode === 'staff') { showStaffView(parseDRows(dParam, prefCodes, areas), prefCodes); }
  else if (mode === 'admin') { showAdminAuth(areas, prefCodes, dParam, params.get('pw') || ''); }
}

function parseDRows(dParam, prefCodes, areas) {
  var rows = [];
  if (!dParam) return rows;
  dParam.split(',').forEach(function(item) {
    var parts = item.trim().split(':');
    if (parts.length !== 2) return;
    var key = parts[0].trim(), count = parseInt(parts[1], 10);
    if (isNaN(count)) return;
    for (var pi = 0; pi < prefCodes.length; pi++) {
      var area = findAreaByCode(areas, prefCodes[pi] + key);
      if (area) { rows.push({area:area, count:count}); return; }
    }
  });
  return rows;
}

function parseAdminD(dParam, prefCodes, areas) {
  var map = new Map();
  if (!dParam) return map;
  dParam.split(';').forEach(function(sec) {
    sec = sec.trim();
    var ci = sec.indexOf(':');
    if (ci < 0) return;
    var num = parseInt(sec.substring(0, ci), 10);
    if (isNaN(num)) return;
    map.set(num, parseDRows(sec.substring(ci + 1), prefCodes, areas));
  });
  return map;
}

function findAreaByCode(areas, code) {
  for (var i = 0; i < areas.length; i++) { if (areas[i].c === code) return areas[i]; }
  return null;
}

function getPrefName(prefCode) { var p = findPref(prefCode); return p ? p.name : ''; }

function dlMapUrl(a) {
  return 'https://www.google.com/maps/search/' + encodeURIComponent(getPrefName(a.c.substring(0,2)) + a.ct + (a.w||'') + a.m);
}

function dlShow(html) {
  var el = document.getElementById('dlContainer');
  if (!el) { el = document.createElement('div'); el.id = 'dlContainer'; document.body.appendChild(el); }
  el.innerHTML = html;
}

function dlStatCard(num, label) {
  return '<div class="dl-stat-card"><div class="dl-stat-num">'+num+'</div><div class="dl-stat-label">'+label+'</div></div>';
}

function dlNameCell(a) {
  return '<div class="dl-name"><div class="dl-moji">'+esc(a.m)+'</div><div class="dl-city">'+esc(a.ct+(a.w?' '+a.w:''))+'</div></div>';
}

function showStaffView(rows, prefCodes) {
  var tc=0, ts=0;
  rows.forEach(function(r){tc+=r.count;ts+=r.area.s;});
  var prefName = prefCodes.map(getPrefName).join('・');
  var html = '<div class="dl-wrap"><div class="dl-header"><span class="dl-icon">📋</span><div><div class="dl-title">配布リスト</div><div class="dl-sub">'+esc(prefName)+'</div></div></div>'
    +'<div class="dl-stats-row">'+dlStatCard(fmtNum(tc),'配布数合計')+dlStatCard(fmtNum(ts),'世帯合計')+dlStatCard(String(rows.length),'エリア数')+'</div>';
  if (!rows.length) {
    html += '<div class="empty-state"><div class="empty-icon">📭</div>データがありません</div>';
  } else {
    html += '<div class="dl-table-header dl-admin-hd"><span class="dl-th-name">町丁目</span><span class="dl-th-sm">配布</span><span class="dl-th-sm">世帯</span><span class="dl-th-sm">戸建</span><span class="dl-th-sm">集合</span><span class="dl-th-sm">集合%</span></div>';
    rows.forEach(function(r){
      var a=r.area, pct=a.s>0?(a.ky/a.s*100).toFixed(0)+'%':'-';
      var pctCls=a.s>0?(a.ky/a.s>=0.8?'pct-green':a.ky/a.s>=0.6?'pct-yellow-green':a.ky/a.s>=0.4?'pct-orange':'pct-red'):'';
      html += '<a class="dl-row" href="'+dlMapUrl(a)+'" target="_blank" rel="noopener noreferrer">'+dlNameCell(a)+'<div class="dl-val dl-sm dl-count">'+fmtNum(r.count)+'</div><div class="dl-val dl-sm">'+fmtNum(a.s)+'</div><div class="dl-val dl-sm">'+fmtNum(a.k)+'</div><div class="dl-val dl-sm">'+fmtNum(a.ky)+'</div><div class="dl-val dl-sm '+pctCls+'">'+pct+'</div></a>';
    });
  }
  html += '<div class="dl-hint">📍 町丁目タップ → Googleマップで確認</div></div>';
  dlShow(html);
}

function showAdminAuth(areas, prefCodes, dParam, pwHash) {
  window._dlAuth = {areas:areas, prefCodes:prefCodes, dParam:dParam, pwHash:pwHash};
  dlShow('<div class="dl-wrap dl-auth"><div class="dl-auth-icon">🔒</div><div class="dl-auth-title">管理者認証</div><div class="dl-auth-sub">パスワードを入力してください</div><input type="password" id="pwInput" class="dl-pw-input" maxlength="4" placeholder="••••" inputmode="numeric"><div id="pwError" class="dl-pw-error"></div><button class="retry-btn" onclick="checkAdminPw()">確認</button></div>');
  var inp = document.getElementById('pwInput');
  inp.addEventListener('keydown', function(e){if(e.key==='Enter')checkAdminPw();});
  inp.focus();
}

async function checkAdminPw() {
  var inp = document.getElementById('pwInput');
  var err = document.getElementById('pwError');
  err.textContent = '';
  try {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(inp.value));
    var hex = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    if (hex === window._dlAuth.pwHash) {
      var ctx = window._dlAuth;
      dlShow('');
      showAdminView(ctx.areas, ctx.prefCodes, ctx.dParam);
    } else {
      err.textContent = 'パスワードが違います';
      inp.value = ''; inp.focus();
    }
  } catch(e) { err.textContent = 'エラーが発生しました'; }
}

function showAdminView(areas, prefCodes, dParam) {
  var staffMap = parseAdminD(dParam, prefCodes, areas);
  var nums = Array.from(staffMap.keys()).sort(function(a,b){return a-b;});
  var tc=0, ta=0;
  nums.forEach(function(n){staffMap.get(n).forEach(function(r){tc+=r.count;ta++;});});
  _adminCtx = {prefName:prefCodes.map(getPrefName).join('・'), staffMap:staffMap, nums:nums, totalCount:tc, totalAreas:ta};
  _adminTab = 0;
  renderAdminView();
}

function renderAdminView() {
  var ctx = _adminCtx;
  var tabs = '<div class="dl-tab-bar"><div class="dl-tab'+((_adminTab===0)?' active':'')+'" onclick="switchTab(0)">全員</div>';
  ctx.nums.forEach(function(n){
    var col=STAFF_COLORS[(n-1)%STAFF_COLORS.length], act=_adminTab===n;
    tabs+='<div class="dl-tab'+(act?' active':'')+'" style="'+(act?'color:'+col+';border-bottom-color:'+col:'')+'" onclick="switchTab('+n+')"><span class="dl-dot" style="background:'+col+'"></span>担当'+n+'</div>';
  });
  tabs += '</div>';
  var body = '';
  var show = _adminTab===0 ? ctx.nums : [_adminTab];
  show.forEach(function(n){
    var col=STAFF_COLORS[(n-1)%STAFF_COLORS.length], rows=ctx.staffMap.get(n)||[];
    var cnt=rows.reduce(function(s,r){return s+r.count;},0);
    body+='<div class="dl-section"><div class="dl-section-hd" style="border-left:3px solid '+col+'"><span class="dl-dot" style="background:'+col+'"></span><strong>担当'+n+'</strong><span class="dl-section-meta">'+rows.length+'エリア・'+fmtNum(cnt)+'部</span></div>'+buildAdminTable(rows)+'</div>';
  });
  var html='<div class="dl-wrap"><div class="dl-header"><span class="dl-icon">📋</span><div><div class="dl-title">管理者ビュー</div><div class="dl-sub">'+esc(ctx.prefName)+'</div></div></div>'
    +tabs+'<div class="dl-stats-row">'+dlStatCard(fmtNum(ctx.totalCount),'総配布数')+dlStatCard(String(ctx.totalAreas),'エリア計')+dlStatCard(String(ctx.nums.length),'担当者数')+'</div>'
    +'<div id="dlContent">'+body+'</div></div>';
  dlShow(html);
}

function buildAdminTable(rows) {
  var html='<div class="dl-table-header dl-admin-hd"><span class="dl-th-name">町丁目</span><span class="dl-th-sm">配布</span><span class="dl-th-sm">世帯</span><span class="dl-th-sm">戸建</span><span class="dl-th-sm">集合</span><span class="dl-th-sm">集合%</span></div>';
  if (!rows.length) return html+'<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">なし</div>';
  rows.forEach(function(r){
    var a=r.area, pct=a.s>0?(a.ky/a.s*100).toFixed(0)+'%':'-';
    html+='<a class="dl-row" href="'+dlMapUrl(a)+'" target="_blank" rel="noopener noreferrer">'+dlNameCell(a)+'<div class="dl-val dl-sm dl-count">'+fmtNum(r.count)+'</div><div class="dl-val dl-sm">'+fmtNum(a.s)+'</div><div class="dl-val dl-sm">'+fmtNum(a.k)+'</div><div class="dl-val dl-sm">'+fmtNum(a.ky)+'</div><div class="dl-val dl-sm">'+pct+'</div></a>';
  });
  return html;
}

function switchTab(n) {
  _adminTab = n;
  renderAdminView();
  var el = document.getElementById('dlContainer');
  if (el) el.scrollTop = 0;
}

// ---- Start ----
startDistribMode();
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>
